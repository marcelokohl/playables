<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcelo Kohl - Playables</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <section id="project-list">
        
                <div class="project-card" onclick="openProject('pixel-cube.html', 'Pixel Cube 3D', 'A high-performance interactive 3D cube featuring smooth touch rotation, physical inertia, and crisp pixel art textures. Optimized for mobile ad networks.', 'TOTAL SIZE: 0.8mb')">
                    <iframe src="pixel-cube.html"></iframe>
                    <div class="info">
                        <strong>Pixel Cube 3D</strong>
                        <span>A high-performance interactive 3D cube featuring smooth touch rotation, physical inertia, and crisp pixel art textures. Optimized for mobile ad networks.</span>
                        <small>TOTAL SIZE: 0.8mb</small>
                    </div>
                </div>
    </section>

    <div id="simulator">
        <div id="simulator-header">
            <div class="simulator-controls">
                <button id="simulator-back">BACK</button>

                <select id="simulator-device-selector">
                    <option value="390x844">iPhone 13 (390x844)</option>
                    <option value="360x800">Galaxy S21 (360x800)</option>
                    <option value="820x1180">iPad Air (820x1180)</option>
                    <option value="fill">Fill Screen</option>
                </select>
                <button id="simulator-open-external">Open New Tab</button>
            </div>
        </div>

        <div id="simulator-body">
            <div id="simulator-info">
                <strong id="simulator-info-title">PROJECT NAME</strong>
                <span id="simulator-info-desc">Description goes here...</span>
                <small id="simulator-info-size">TOTAL SIZE: 0.0mb</small>
            </div>

            <div id="simulator-frame">
                <iframe id="simulator-iframe" src=""></iframe>
            </div>
        </div>
    </div>

    <script type="module" src="/script.js"></script>
</body>

</html>
